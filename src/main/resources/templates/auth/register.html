<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Register')}"></head>
<body class="auth-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card auth-card">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h3 fw-bold mb-2">Join ShareNest</h1>
                    <p class="text-muted mb-4">Create your community profile and start sharing responsibly.</p>
                    <form th:action="@{/register}" th:object="${registrationForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" for="fullName">Full name</label>
                                <input class="form-control" id="fullName" th:field="*{fullName}" required>
                                <div class="text-danger small" th:errors="*{fullName}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="email">Email</label>
                                <input class="form-control" id="email" th:field="*{email}" type="email" required>
                                <div class="text-danger small" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="phone">Phone</label>
                                <input class="form-control" id="phone" th:field="*{phone}" required>
                                <div class="text-danger small" th:errors="*{phone}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="password">Password</label>
                                <input class="form-control" id="password" th:field="*{password}" type="password" required>
                                <div class="text-danger small" th:errors="*{password}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="address">Address</label>
                                <textarea class="form-control" id="address" th:field="*{address}" rows="3" required></textarea>
                                <div class="text-danger small" th:errors="*{address}"></div>
                            </div>
                        </div>
                        <button class="btn btn-primary w-100 mt-4" type="submit">Create account</button>
                    </form>
                    <p class="text-center text-muted mt-4 mb-0">Already registered? <a th:href="@{/login}">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
