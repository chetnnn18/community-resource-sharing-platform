<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body class="auth-bg">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <div class="card auth-card">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h3 fw-bold mb-2">Welcome back</h1>
                    <p class="text-muted mb-4">Log in to manage your shared items and borrow requests.</p>
                    <div class="alert alert-danger" th:if="${param.error}">Invalid email or password.</div>
                    <div class="alert alert-success" th:if="${param.logout}">You have been logged out.</div>
                    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" id="email" name="email" type="email" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" id="password" name="password" type="password" required>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Login</button>
                    </form>
                    <p class="text-center text-muted mt-4 mb-0">New here? <a th:href="@{/register}">Create an account</a></p>
                    <div class="small text-muted mt-3">Seed login: admin@sharenest.local / password</div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
