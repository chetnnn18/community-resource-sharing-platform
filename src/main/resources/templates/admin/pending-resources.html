<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Pending Resources')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/alerts :: alerts}"></div>

<main class="container py-4">
    <div class="dashboard-heading">
        <div>
            <p class="section-kicker mb-1">Admin review</p>
            <h1 class="h2 fw-bold mb-0">Pending resources</h1>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/admin}">Back to admin</a>
    </div>

    <div class="card table-card">
        <div class="table-responsive">
            <table class="table align-middle mb-0 pending-resource-table">
                <thead>
                <tr>
                    <th>Image</th>
                    <th>Title</th>
                    <th>Owner</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="pendingResourceRows">
                <tr th:each="item : ${items}" th:attr="data-resource-row=${item.id}">
                    <td>
                        <img th:if="${!#strings.isEmpty(item.imageUrl)}" class="pending-resource-thumb" th:src="${item.imageUrl}" th:alt="${item.title}">
                        <div th:if="${#strings.isEmpty(item.imageUrl)}" class="pending-resource-thumb item-placeholder"></div>
                    </td>
                    <td>
                        <div class="fw-semibold" th:text="${item.title}">Resource title</div>
                        <a class="small" th:href="@{/items/view/{id}(id=${item.id})}">Preview</a>
                    </td>
                    <td th:text="${item.owner.fullName}">Owner</td>
                    <td th:text="${item.category.name}">Category</td>
                    <td th:text="${item.price.signum() == 0 ? 'Free' : 'Rs. ' + #numbers.formatDecimal(item.price, 1, 2)}">Free</td>
                    <td>
                        <span class="approval-badge approval-pending">Pending</span>
                    </td>
                    <td class="text-end">
                        <div class="request-actions">
                            <form th:action="@{/admin/resources/{id}/approve(id=${item.id})}"
                                  th:attr="data-put-url=@{/admin/resources/{id}/approve(id=${item.id})}"
                                  method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-success" type="submit"><i class="bi bi-check-lg"></i> Approve</button>
                            </form>
                            <form th:action="@{/admin/resources/{id}/reject(id=${item.id})}"
                                  th:attr="data-put-url=@{/admin/resources/{id}/reject(id=${item.id})}"
                                  method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-outline-danger" type="submit"><i class="bi bi-x-lg"></i> Reject</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr id="pendingResourceEmpty" th:classappend="${#lists.isEmpty(items)} ? '' : ' d-none'">
                    <td colspan="7" class="text-muted text-center py-4">No resources are waiting for approval.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
    document.querySelectorAll('form[data-put-url]').forEach((form) => {
        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const token = form.querySelector('input[name="_csrf"]').value;
            const button = form.querySelector('button');
            button.disabled = true;

            try {
                const response = await fetch(form.dataset.putUrl, {
                    method: 'PUT',
                    headers: {'X-CSRF-TOKEN': token}
                });

                if (!response.ok) {
                    throw new Error('Request failed');
                }

                const row = form.closest('[data-resource-row]');
                row.remove();
                if (!document.querySelector('[data-resource-row]')) {
                    document.getElementById('pendingResourceEmpty').classList.remove('d-none');
                }
            } catch (error) {
                form.submit();
            }
        });
    });
</script>
</body>
</html>
