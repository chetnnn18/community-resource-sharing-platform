<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Requests')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container py-4">
    <div class="dashboard-heading">
        <h1 class="h2 fw-bold">Borrow requests</h1>
        <a class="btn btn-outline-secondary" th:href="@{/admin}">Back to admin</a>
    </div>
    <div class="card table-card">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead><tr><th>Item</th><th>Borrower</th><th>Owner</th><th>Dates</th><th>Status</th></tr></thead>
                <tbody>
                <tr th:each="request : ${requests}">
                    <td th:text="${request.item.title}">Item</td>
                    <td th:text="${request.borrower.fullName}">Borrower</td>
                    <td th:text="${request.item.owner.fullName}">Owner</td>
                    <td><span th:text="${request.startDate}"></span> to <span th:text="${request.endDate}"></span></td>
                    <td><span class="badge text-bg-light" th:text="${request.status}">Status</span></td>
                </tr>
                <tr th:if="${#lists.isEmpty(requests)}"><td colspan="5" class="text-muted">No requests yet.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
