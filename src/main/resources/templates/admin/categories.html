<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Categories')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="container py-4">
    <div class="dashboard-heading">
        <h1 class="h2 fw-bold">Categories</h1>
        <a class="btn btn-outline-secondary" th:href="@{/admin}">Back to admin</a>
    </div>
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card form-card">
                <div class="card-body">
                    <h2 class="h5">Add category</h2>
                    <form th:action="@{/admin/categories}" th:object="${category}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label" for="name">Name</label>
                            <input class="form-control" id="name" th:field="*{name}" required>
                            <div class="text-danger small" th:errors="*{name}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="description">Description</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                            <div class="text-danger small" th:errors="*{description}"></div>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Save category</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card table-card">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead><tr><th>Name</th><th>Description</th><th></th></tr></thead>
                        <tbody>
                        <tr th:each="category : ${categories}">
                            <td th:text="${category.name}">Name</td>
                            <td th:text="${category.description}">Description</td>
                            <td class="text-end">
                                <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
