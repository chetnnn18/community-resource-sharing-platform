<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Users')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/alerts :: alerts}"></div>
<main class="container py-4">
    <div class="dashboard-heading">
        <h1 class="h2 fw-bold">Users</h1>
        <a class="btn btn-outline-secondary" th:href="@{/admin}">Back to admin</a>
    </div>
    <div class="card table-card">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Status</th><th></th></tr></thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.fullName}">Name</td>
                    <td th:text="${user.email}">Email</td>
                    <td th:text="${user.phone}">Phone</td>
                    <td><span class="badge text-bg-light" th:text="${user.role}">Role</span></td>
                    <td><span class="badge" th:classappend="${user.enabled} ? ' text-bg-success' : ' text-bg-secondary'" th:text="${user.enabled} ? 'ACTIVE' : 'DISABLED'">ACTIVE</span></td>
                    <td class="text-end">
                        <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-secondary" type="submit" th:text="${user.enabled} ? 'Disable' : 'Enable'">Toggle</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
