<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(${item.title})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/alerts :: alerts}"></div>

<main class="container py-4">
    <div class="row g-4">
        <div class="col-lg-7">
            <img th:if="${!#strings.isEmpty(item.imageUrl)}" th:src="${item.imageUrl}" class="detail-image" th:alt="${item.title}">
            <div th:if="${#strings.isEmpty(item.imageUrl)}" class="detail-image item-placeholder"></div>
        </div>
        <div class="col-lg-5">
            <div class="sticky-lg-top detail-panel">
                <div class="d-flex justify-content-between gap-3 align-items-start">
                    <div>
                        <span class="badge text-bg-light mb-2" th:text="${item.category.name}">Category</span>
                        <h1 class="h2 fw-bold" th:text="${item.title}">Item title</h1>
                    </div>
                    <span class="badge fs-6" th:classappend="${item.status.name() == 'AVAILABLE'} ? ' text-bg-success' : (${item.status.name() == 'BORROWED'} ? ' text-bg-warning' : ' text-bg-info')" th:text="${item.status}">AVAILABLE</span>
                </div>
                <p class="text-muted mt-3" th:text="${item.description}">Description</p>
                <div class="resource-meta">
                    <div><i class="bi bi-person-circle"></i> <span th:text="${item.owner.fullName}">Owner</span></div>
                    <div><i class="bi bi-geo-alt"></i> <span th:text="${item.location}">Location</span></div>
                    <div><i class="bi bi-clock"></i> Added <span th:text="${#temporals.format(item.createdAt, 'dd MMM yyyy')}"></span></div>
                </div>

                <div sec:authorize="isAuthenticated()" th:if="${currentUser != null and currentUser.id == item.owner.id}" class="d-flex gap-2 mt-4">
                    <a class="btn btn-outline-primary flex-fill" th:href="@{/items/{id}/edit(id=${item.id})}"><i class="bi bi-pencil"></i> Edit</a>
                    <form class="flex-fill" th:action="@{/items/{id}/delete(id=${item.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-outline-danger w-100" type="submit"><i class="bi bi-trash"></i> Delete</button>
                    </form>
                </div>

                <div sec:authorize="isAnonymous()" class="mt-4">
                    <a class="btn btn-primary w-100" th:href="@{/login}">Login to request this item</a>
                </div>

                <form sec:authorize="isAuthenticated()"
                      th:if="${currentUser != null and currentUser.id != item.owner.id and item.status.name() == 'AVAILABLE'}"
                      th:action="@{/items/{id}/borrow(id=${item.id})}"
                      th:object="${borrowRequest}"
                      method="post"
                      class="borrow-box mt-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <h2 class="h5 mb-3">Request to borrow</h2>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="startDate">Start date</label>
                            <input class="form-control" id="startDate" th:field="*{startDate}" type="date" required>
                            <div class="text-danger small" th:errors="*{startDate}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="endDate">End date</label>
                            <input class="form-control" id="endDate" th:field="*{endDate}" type="date" required>
                            <div class="text-danger small" th:errors="*{endDate}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="message">Message</label>
                            <textarea class="form-control" id="message" th:field="*{message}" rows="3" placeholder="Share pickup timing or purpose"></textarea>
                            <div class="text-danger small" th:errors="*{message}"></div>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100 mt-3" type="submit">Send request</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
