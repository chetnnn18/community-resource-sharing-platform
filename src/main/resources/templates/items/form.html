<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${itemId} == null ? 'Add Item' : 'Edit Item')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card form-card">
                <div class="card-body p-4">
                    <h1 class="h3 fw-bold" th:text="${itemId} == null ? 'Add a shared item' : 'Edit item'">Add item</h1>
                    <p class="text-muted">Give neighbors enough detail to borrow confidently.</p>
                    <form th:action="${itemId} == null ? @{/items} : @{/items/{id}/edit(id=${itemId})}" th:object="${itemForm}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" th:field="*{imageUrl}">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label" for="title">Title</label>
                                <input class="form-control" id="title" th:field="*{title}" required>
                                <div class="text-danger small" th:errors="*{title}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="categoryId">Category</label>
                                <select class="form-select" id="categoryId" th:field="*{categoryId}" required>
                                    <option value="">Choose</option>
                                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                                </select>
                                <div class="text-danger small" th:errors="*{categoryId}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="description">Description</label>
                                <textarea class="form-control" id="description" th:field="*{description}" rows="5" required></textarea>
                                <div class="text-danger small" th:errors="*{description}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="location">Pickup location</label>
                                <input class="form-control" id="location" th:field="*{location}" required>
                                <div class="text-danger small" th:errors="*{location}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="status">Status</label>
                                <select class="form-select" id="status" th:field="*{status}">
                                    <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="imageFile">Item image</label>
                                <input class="form-control" id="imageFile" th:field="*{imageFile}" type="file" accept="image/*">
                                <div class="form-text">Upload a JPG, PNG, GIF or WebP image from your phone or computer.</div>
                                <div class="text-danger small" th:errors="*{imageFile}"></div>
                                <div th:if="${!#strings.isEmpty(itemForm.imageUrl)}" class="mt-3">
                                    <p class="small text-muted mb-2">Current image</p>
                                    <img class="form-image-preview" th:src="${itemForm.imageUrl}" alt="Current item image">
                                </div>
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button class="btn btn-primary" type="submit">Save item</button>
                            <a class="btn btn-outline-secondary" th:href="@{/dashboard}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
