<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Browse Items')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/alerts :: alerts}"></div>

<main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-4">
        <div>
            <p class="section-kicker mb-1">Community inventory</p>
            <h1 class="h2 fw-bold mb-0">Browse items</h1>
        </div>
        <a class="btn btn-primary" th:href="@{/items/new}"><i class="bi bi-plus-lg"></i> Add Item</a>
    </div>

    <form class="search-panel row g-3 align-items-end mb-4" th:action="@{/items}" method="get">
        <div class="col-md-6">
            <label class="form-label" for="keyword">Search</label>
            <input class="form-control" id="keyword" name="keyword" th:value="${keyword}" placeholder="Try ladder, cooker, books">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="categoryId">Category</label>
            <select class="form-select" id="categoryId" name="categoryId">
                <option value="">All categories</option>
                <option th:each="category : ${categories}" th:value="${category.id}" th:selected="${category.id == categoryId}" th:text="${category.name}"></option>
            </select>
        </div>
        <div class="col-md-2 d-grid">
            <button class="btn btn-dark" type="submit"><i class="bi bi-search"></i> Search</button>
        </div>
    </form>

    <div class="row g-4" th:if="${!#lists.isEmpty(items)}">
        <div class="col-md-6 col-xl-4" th:each="item : ${items}">
            <div class="card item-card h-100">
                <img th:if="${!#strings.isEmpty(item.imageUrl)}" th:src="${item.imageUrl}" class="card-img-top" th:alt="${item.title}">
                <div th:if="${#strings.isEmpty(item.imageUrl)}" class="item-placeholder"></div>
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="badge text-bg-light" th:text="${item.category.name}">Category</span>
                        <span class="badge" th:classappend="${item.status.name() == 'AVAILABLE'} ? ' text-bg-success' : (${item.status.name() == 'BORROWED'} ? ' text-bg-warning' : ' text-bg-info')" th:text="${item.status}">AVAILABLE</span>
                    </div>
                    <h2 class="h5" th:text="${item.title}">Item name</h2>
                    <p class="text-muted line-clamp" th:text="${item.description}">Description</p>
                    <div class="fw-semibold mb-2" th:text="${item.price.signum() == 0 ? 'Free' : 'Rs. ' + #numbers.formatDecimal(item.price, 1, 2)}">Free</div>
                    <div class="small text-muted"><i class="bi bi-geo-alt"></i> <span th:text="${item.location}">Location</span></div>
                </div>
                <div class="card-footer bg-white border-0 pt-0">
                    <a class="btn btn-outline-primary w-100" th:href="@{/items/view/{id}(id=${item.id})}">View details</a>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(items)}">
        <i class="bi bi-box-seam"></i>
        <h2 class="h4">No items found</h2>
        <p class="text-muted">Try a different search or category.</p>
    </div>
</main>
</body>
</html>
